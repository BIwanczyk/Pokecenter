services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pokecenter
      MYSQL_USER: pokecenter
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
volumes:
  mysql_data:
